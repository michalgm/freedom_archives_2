name: Deploy

permissions:
  contents: write

on:
  push:
    branches: ['**']
    tags: ['v*']

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: stage
        type: choice
        options:
          - stage
          - prod
      ref:
        description: 'Stage: branch/SHA. Prod: tag. Blank = current SHA (stage) or latest release tag (prod).'
        required: false
        type: string
      keep_releases:
        description: 'Prod only: how many tag directories to keep under deployments/'
        required: false
        default: '10'
        type: string

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || startsWith(github.ref, 'refs/tags/v') && 'prod' || 'stage' }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve deployment target
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.resolve.outputs.target_env }}
      source_mode: ${{ steps.resolve.outputs.source_mode }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      app_name: ${{ steps.resolve.outputs.app_name }}
      keep_releases: ${{ steps.resolve.outputs.keep_releases }}
      run_migrations: ${{ steps.resolve.outputs.run_migrations }}
    steps:
      - name: Resolve settings
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_ENV="${{ github.event.inputs.environment }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TARGET_ENV="prod"
          else
            TARGET_ENV="stage"
          fi

          if [ "$TARGET_ENV" = "prod" ]; then
            APP_NAME="freedom_archives_2"
            KEEP_RELEASES="${{ github.event.inputs.keep_releases || '10' }}"
            RUN_MIGRATIONS="true"

            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              if [ -n "${{ github.event.inputs.ref }}" ]; then
                CHECKOUT_REF="${{ github.event.inputs.ref }}"
              elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
                CHECKOUT_REF="${GITHUB_REF_NAME}"
              else
                CHECKOUT_REF="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
              fi

              if [[ ! "$CHECKOUT_REF" =~ ^v ]]; then
                echo "Production deploys require a v* tag." >&2
                exit 1
              fi

              SOURCE_MODE="release"
            else
              CHECKOUT_REF="${GITHUB_REF_NAME}"
              SOURCE_MODE="build"
            fi
          else
            APP_NAME="freedom_archives_staging"
            KEEP_RELEASES="0"
            RUN_MIGRATIONS="false"
            CHECKOUT_REF="${{ github.event.inputs.ref }}"
            if [ -z "$CHECKOUT_REF" ]; then
              CHECKOUT_REF="${GITHUB_SHA}"
            fi
            SOURCE_MODE="build"
          fi

          echo "target_env=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "source_mode=$SOURCE_MODE" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "keep_releases=$KEEP_RELEASES" >> "$GITHUB_OUTPUT"
          echo "run_migrations=$RUN_MIGRATIONS" >> "$GITHUB_OUTPUT"

  package_frontend:
    name: Build or fetch frontend package
    runs-on: ubuntu-latest
    needs: resolve
    outputs:
      release_name: ${{ steps.meta.outputs.release_name }}
      deploy_ref: ${{ steps.meta.outputs.deploy_ref }}
    steps:
      - name: Checkout Code
        if: needs.resolve.outputs.source_mode == 'build'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Enable Corepack
        if: needs.resolve.outputs.source_mode == 'build'
        run: corepack enable

      - name: Setup Node.js
        if: needs.resolve.outputs.source_mode == 'build'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'

      - name: Install Frontend Dependencies
        if: needs.resolve.outputs.source_mode == 'build'
        run: yarn workspaces focus freedom-archives-frontend

      - name: Build Frontend
        if: needs.resolve.outputs.source_mode == 'build'
        working-directory: ./frontend
        run: yarn run build

      - name: Prepare Release Package
        if: needs.resolve.outputs.source_mode == 'build'
        run: |
          set -euo pipefail
          test -d frontend/build
          tar -czf freedom-archives-frontend-build.tar.gz -C frontend/build .

      - name: Set build metadata
        if: needs.resolve.outputs.source_mode == 'build'
        id: meta_build
        run: |
          set -euo pipefail
          FULL_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"

          if [ "${{ needs.resolve.outputs.target_env }}" = "stage" ]; then
            RELEASE_NAME="$SHORT_SHA"
            DEPLOY_REF="$FULL_SHA"
          else
            RELEASE_NAME="${{ needs.resolve.outputs.checkout_ref }}"
            DEPLOY_REF="${{ needs.resolve.outputs.checkout_ref }}"
          fi

          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "deploy_ref=$DEPLOY_REF" >> "$GITHUB_OUTPUT"

      - name: Download release asset
        if: needs.resolve.outputs.source_mode == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download "${{ needs.resolve.outputs.checkout_ref }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "freedom-archives-frontend-build.tar.gz"
          ls -lh freedom-archives-frontend-build.tar.gz

      - name: Set release metadata
        if: needs.resolve.outputs.source_mode == 'release'
        id: meta_release
        run: |
          echo "release_name=${{ needs.resolve.outputs.checkout_ref }}" >> "$GITHUB_OUTPUT"
          echo "deploy_ref=${{ needs.resolve.outputs.checkout_ref }}" >> "$GITHUB_OUTPUT"

      - name: Normalize metadata
        id: meta
        run: |
          echo "release_name=${{ steps.meta_build.outputs.release_name || steps.meta_release.outputs.release_name }}" >> "$GITHUB_OUTPUT"
          echo "deploy_ref=${{ steps.meta_build.outputs.deploy_ref || steps.meta_release.outputs.deploy_ref }}" >> "$GITHUB_OUTPUT"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: freedom-archives-frontend-build
          path: freedom-archives-frontend-build.tar.gz
          retention-days: 1

      - name: Publish GitHub Release Asset
        if: needs.resolve.outputs.target_env == 'prod' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.checkout_ref }}
          name: ${{ needs.resolve.outputs.checkout_ref }}
          files: |
            freedom-archives-frontend-build.tar.gz

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - resolve
      - package_frontend
    env:
      TARGET_ENV: ${{ needs.resolve.outputs.target_env }}
      APP_NAME: ${{ needs.resolve.outputs.app_name }}
      APP_DIR: /home/${{ secrets.SSH_USER }}/work/${{ needs.resolve.outputs.app_name }}
      DEPLOYMENTS_DIR: /home/${{ secrets.SSH_USER }}/work/${{ needs.resolve.outputs.app_name }}/deployments
      PUBLIC_DIST_LINK: /home/${{ secrets.SSH_USER }}/work/${{ needs.resolve.outputs.app_name }}/public_dist
      KEEP_RELEASES: ${{ needs.resolve.outputs.keep_releases }}
      RUN_MIGRATIONS: ${{ needs.resolve.outputs.run_migrations }}
      RELEASE_NAME: ${{ needs.package_frontend.outputs.release_name }}
      DEPLOY_REF: ${{ needs.package_frontend.outputs.deploy_ref }}
      FRONTEND_RELEASE_DIR: /home/${{ secrets.SSH_USER }}/work/${{ needs.resolve.outputs.app_name }}/deployments/${{ needs.package_frontend.outputs.release_name }}
      ACTIVATE_SCRIPT: /home/${{ secrets.SSH_USER }}/nodevenv/work/${{ needs.resolve.outputs.app_name }}/20/bin/activate
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: freedom-archives-frontend-build
          path: .
          
      - name: Debug deploy paths
        run: |
          echo "TARGET_ENV=$TARGET_ENV"
          echo "APP_DIR=$APP_DIR"
          echo "DEPLOYMENTS_DIR=$DEPLOYMENTS_DIR"
          echo "RELEASE_NAME=$RELEASE_NAME"
          echo "FRONTEND_RELEASE_DIR=$FRONTEND_RELEASE_DIR"
          echo "ACTIVATE_SCRIPT=$ACTIVATE_SCRIPT"

      - name: Prepare remote release directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: FRONTEND_RELEASE_DIR
          script: |
            set -euo pipefail
            mkdir -p "$FRONTEND_RELEASE_DIR"

      - name: Copy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "freedom-archives-frontend-build.tar.gz"
          target: ${{ env.FRONTEND_RELEASE_DIR }}

      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: TARGET_ENV,APP_DIR,DEPLOYMENTS_DIR,PUBLIC_DIST_LINK,KEEP_RELEASES,RUN_MIGRATIONS,RELEASE_NAME,DEPLOY_REF,FRONTEND_RELEASE_DIR,ACTIVATE_SCRIPT
          script: |
            set -euo pipefail

            echo "Deploy target: $TARGET_ENV"
            echo "Backend ref: $DEPLOY_REF"
            echo "Frontend release: $RELEASE_NAME"

            mkdir -p "$FRONTEND_RELEASE_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Missing git checkout at $APP_DIR" >&2
              exit 1
            fi

            echo "🔄 Updating backend code..."
            cd "$APP_DIR"
            git fetch --tags --prune origin
            git checkout --force "$DEPLOY_REF"
            git reset --hard "$DEPLOY_REF"

            echo "🔄 Setting up environment..."
            source "$ACTIVATE_SCRIPT" || echo "⚠️ verify activate.sh path if this fails"

            echo "📦 Installing/updating backend dependencies..."
            yarn install

            echo "📦 Extracting frontend build into: $FRONTEND_RELEASE_DIR"
            tar -xzf "$FRONTEND_RELEASE_DIR/freedom-archives-frontend-build.tar.gz" -C "$FRONTEND_RELEASE_DIR"
            rm -f "$FRONTEND_RELEASE_DIR/freedom-archives-frontend-build.tar.gz"

            echo "🔗 Updating public_dist symlink: $PUBLIC_DIST_LINK -> $FRONTEND_RELEASE_DIR"
            rm -rf "$PUBLIC_DIST_LINK"
            ln -sfn "$FRONTEND_RELEASE_DIR" "$PUBLIC_DIST_LINK"

            if [ "$RUN_MIGRATIONS" = "true" ]; then
              echo "🔄 Running migrations..."
              NODE_ENV=production yarn run migrate
            else
              echo "⏭️ Skipping migrations on staging deploy."
            fi

            echo "🔄 Restarting Node Service..."
            /usr/sbin/cloudlinux-selector restart --interpreter nodejs --app-root "$APP_DIR" --json

            echo "🧹 Cleaning up old frontend releases..."
            if [ "$TARGET_ENV" = "prod" ]; then
              if [ -d "$DEPLOYMENTS_DIR" ]; then
                RELEASES=$(find "$DEPLOYMENTS_DIR" -maxdepth 1 -mindepth 1 -type d -name 'v*' -printf '%f\n' 2>/dev/null | sort -V || true)
                TOTAL=$(printf "%s\n" "$RELEASES" | sed '/^$/d' | wc -l | tr -d ' ')

                if [ "${TOTAL:-0}" -gt "${KEEP_RELEASES:-10}" ]; then
                  DELETE_COUNT=$((TOTAL - KEEP_RELEASES))
                  printf "%s\n" "$RELEASES" | sed '/^$/d' | head -n "$DELETE_COUNT" | while read -r rel; do
                    [ -z "$rel" ] && continue
                    [ "$rel" = "$RELEASE_NAME" ] && continue
                    echo "  removing $DEPLOYMENTS_DIR/$rel"
                    rm -rf "$DEPLOYMENTS_DIR/$rel"
                  done
                else
                  echo "  nothing to clean (have $TOTAL, keeping $KEEP_RELEASES)"
                fi
              fi
            else
              if [ -d "$DEPLOYMENTS_DIR" ]; then
                find "$DEPLOYMENTS_DIR" -maxdepth 1 -mindepth 1 -type d ! -name "$RELEASE_NAME" -exec rm -rf {} +
              fi
            fi

            echo "✅ Deployment Success!"